<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ef4d2f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Impulso +">
  <meta name="description" content="PWA de dinámicas positivas basada en Impulso Positivo. Autor PWA: Ivo Güell.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="stylesheet" href="styles.css">
  <title>Impulso Positivo · IDEI Consultores</title>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img src="assets/idei-logo.png" alt="IDEI Consultores" class="brand-logo">
        <div>
          <p class="eyebrow">IDEI Consultores</p>
          <h1>Impulso Positivo</h1>
          <p class="byline">Autor PWA: <strong>Ivo Güell</strong></p>
        </div>
      </div>
      <button class="install-pill" id="installBtn" type="button">Instalar +</button>
    </header>

    <main id="main" class="main" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="Navegación principal">
      <button data-view="home" class="nav-item active" type="button"><span>＋</span>Hoy</button>
      <button data-view="journal" class="nav-item" type="button"><span>✍</span>Diario</button>
      <button data-view="exercises" class="nav-item" type="button"><span>◌</span>Impulsos</button>
      <button data-view="calendar" class="nav-item" type="button"><span>66</span>Orden</button>
      <button data-view="phrases" class="nav-item" type="button"><span>❞</span>Frases</button>
    </nav>

    <button class="floating-plus" id="quickPlus" type="button" aria-label="Abrir impulso rápido">+</button>
  </div>

  <div class="modal hidden" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <button class="modal-close" id="modalClose" type="button" aria-label="Cerrar">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script defer src="app.js"></script>
</body>
</html>
