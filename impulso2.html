<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ef6a32">
  <meta name="description" content="Impulso Positivo. PWA de dinámicas positivas. Autor PWA: Ivo Güell.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Impulso +">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icon-192.png">
  <title>Impulso Positivo · IDEI Consultores</title>
  <style>
    :root{
      --bg0:#15110f;
      --bg1:#2a1713;
      --card:rgba(255,255,255,.10);
      --card2:rgba(255,255,255,.16);
      --text:#fffaf4;
      --muted:rgba(255,250,244,.72);
      --line:rgba(255,255,255,.15);
      --orange:#ef6a32;
      --orange2:#ff9a4b;
      --brown:#713326;
      --ok:#86f5bc;
      --shadow:0 22px 55px rgba(0,0,0,.36);
      --radius:28px;
    }

    *{box-sizing:border-box}
    html{height:100%;background:#15110f}
    body{
      margin:0;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 22% 8%, rgba(255,154,75,.34), transparent 34%),
        radial-gradient(circle at 92% 28%, rgba(239,106,50,.20), transparent 32%),
        linear-gradient(155deg,#14100f 0%,#2d1914 46%,#512719 100%);
      overflow-x:hidden;
    }

    button,input,textarea{font:inherit}
    button{cursor:pointer}

    .app-shell{
      width:min(100%,560px);
      min-height:100dvh;
      margin:0 auto;
      padding:18px 16px 108px;
      position:relative;
    }

    .topbar{
      display:flex;
      gap:14px;
      align-items:center;
      justify-content:space-between;
      padding:14px;
      border:1px solid var(--line);
      border-radius:32px;
      background:linear-gradient(145deg,rgba(255,255,255,.18),rgba(255,255,255,.06));
      backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
      position:sticky;
      top:12px;
      z-index:10;
    }

    .brand{display:flex;align-items:center;gap:13px;min-width:0}
    .brand-logo{
      width:72px;
      height:72px;
      object-fit:contain;
      border-radius:22px;
      background:#fff;
      padding:6px;
      flex:0 0 auto;
      box-shadow:0 12px 30px rgba(0,0,0,.24);
    }
    .eyebrow{
      margin:0 0 2px;
      color:rgba(255,255,255,.72);
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-weight:800;
    }
    h1{
      margin:0;
      font-size:clamp(30px,8vw,48px);
      line-height:.95;
      letter-spacing:-.055em;
      font-weight:950;
    }
    .byline{margin:8px 0 0;color:var(--muted);font-size:13px;font-weight:650}

    .install-pill{
      border:0;
      color:#24110b;
      background:linear-gradient(145deg,#fff1df,#ff9a4b 42%,#ef6a32 100%);
      border-radius:999px;
      padding:12px 14px;
      font-weight:950;
      box-shadow:0 14px 26px rgba(239,106,50,.32), inset 0 1px 0 rgba(255,255,255,.85);
      white-space:nowrap;
      flex:0 0 auto;
    }

    .hero{
      margin-top:18px;
      padding:26px 20px;
      border-radius:var(--radius);
      background:
        linear-gradient(145deg,rgba(255,255,255,.18),rgba(255,255,255,.07)),
        radial-gradient(circle at 85% 16%,rgba(255,255,255,.20),transparent 22%);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .hero:after{
      content:"+";
      position:absolute;
      right:-6px;
      top:-42px;
      font-size:190px;
      line-height:1;
      color:rgba(255,255,255,.08);
      font-weight:950;
      pointer-events:none;
    }
    .kicker{margin:0 0 10px;color:#ffd1a8;font-weight:900;letter-spacing:.08em;text-transform:uppercase;font-size:12px}
    .hero h2{margin:0;font-size:30px;line-height:1.02;letter-spacing:-.04em}
    .hero p{margin:14px 0 0;color:var(--muted);font-size:16px;line-height:1.45}
    .hero-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}

    .primary,.secondary,.small-btn{
      border:0;
      border-radius:22px;
      padding:14px 15px;
      font-weight:950;
      letter-spacing:-.02em;
    }
    .primary{
      color:#2b1209;
      background:linear-gradient(145deg,#fff2dc,#ff9a4b 44%,#e65226 100%);
      box-shadow:0 18px 35px rgba(239,106,50,.34), inset 0 1px 0 rgba(255,255,255,.88);
    }
    .secondary{
      color:var(--text);
      background:rgba(255,255,255,.12);
      border:1px solid var(--line);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
    }
    .small-btn{
      padding:10px 12px;
      font-size:13px;
      border-radius:16px;
      color:#2b1209;
      background:#fff1df;
    }

    .section-title{
      display:flex;
      justify-content:space-between;
      align-items:end;
      gap:12px;
      margin:24px 4px 12px;
    }
    .section-title h2{font-size:22px;margin:0;letter-spacing:-.035em}
    .section-title p{margin:4px 0 0;color:var(--muted);font-size:13px}

    .grid{display:grid;gap:12px}
    .two{grid-template-columns:1fr 1fr}
    .card{
      padding:17px;
      border-radius:24px;
      background:linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.07));
      border:1px solid var(--line);
      box-shadow:0 13px 32px rgba(0,0,0,.20);
    }
    .card h3{margin:0 0 7px;font-size:18px;letter-spacing:-.03em}
    .card p{margin:0;color:var(--muted);line-height:1.43;font-size:14px}
    .card .tag{display:inline-flex;margin-bottom:11px;padding:6px 9px;border-radius:999px;background:rgba(255,154,75,.16);color:#ffd2aa;font-weight:900;font-size:12px}

    .quote-card{
      padding:20px;
      border-radius:26px;
      border:1px solid rgba(255,255,255,.17);
      background:linear-gradient(145deg,rgba(255,154,75,.23),rgba(255,255,255,.08));
      box-shadow:var(--shadow);
    }
    .quote-card blockquote{margin:0;font-size:22px;line-height:1.18;letter-spacing:-.03em;font-weight:900}
    .quote-card p{margin:12px 0 0;color:var(--muted);line-height:1.35}

    .journal-box textarea{
      width:100%;min-height:180px;resize:vertical;
      color:var(--text);
      background:rgba(0,0,0,.18);
      border:1px solid var(--line);
      border-radius:22px;
      padding:15px;
      outline:none;
      line-height:1.45;
    }
    .journal-box textarea::placeholder{color:rgba(255,255,255,.44)}
    .journal-actions{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
    .entry{border-left:4px solid var(--orange2);padding-left:12px}
    .entry time{display:block;color:#ffd2aa;font-size:12px;font-weight:900;margin-bottom:6px}

    .days{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
    .day{
      aspect-ratio:1;
      border:1px solid var(--line);
      border-radius:18px;
      color:var(--text);
      background:rgba(255,255,255,.10);
      font-weight:950;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.10);
    }
    .day.done{background:linear-gradient(145deg,#aef6c8,#33d683);color:#102315;border:0;box-shadow:0 12px 24px rgba(51,214,131,.24)}

    .progress{
      height:12px;
      background:rgba(255,255,255,.12);
      border-radius:999px;
      overflow:hidden;
      margin-top:10px;
    }
    .bar{height:100%;width:0%;background:linear-gradient(90deg,#ff9a4b,#86f5bc);border-radius:999px;transition:.35s}

    .bottom-nav{
      position:fixed;
      left:50%;
      bottom:12px;
      transform:translateX(-50%);
      width:min(calc(100% - 24px),540px);
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      padding:8px;
      border-radius:28px;
      background:rgba(22,16,14,.84);
      backdrop-filter:blur(20px);
      border:1px solid var(--line);
      box-shadow:0 18px 48px rgba(0,0,0,.45);
      z-index:20;
    }
    .nav-item{
      border:0;
      border-radius:22px;
      padding:9px 3px 8px;
      color:rgba(255,255,255,.66);
      background:transparent;
      font-size:11px;
      font-weight:850;
      display:flex;
      flex-direction:column;
      gap:3px;
      align-items:center;
    }
    .nav-item span{font-size:18px;line-height:1;font-weight:950}
    .nav-item.active{color:#271208;background:linear-gradient(145deg,#fff2dc,#ff9a4b 50%,#ef6a32)}

    .floating-plus{
      position:fixed;
      right:max(18px,calc((100vw - 560px)/2 + 18px));
      bottom:96px;
      width:70px;
      height:70px;
      border:1px solid rgba(255,255,255,.40);
      border-radius:24px;
      color:#fff;
      font-size:44px;
      line-height:1;
      font-weight:950;
      background:linear-gradient(145deg,#f3a04c 0%,#b94c30 48%,#4a201c 100%);
      box-shadow:0 25px 45px rgba(0,0,0,.42),0 16px 34px rgba(239,106,50,.25),inset 0 1px 1px rgba(255,255,255,.78),inset 0 -13px 22px rgba(0,0,0,.26);
      text-shadow:0 5px 12px rgba(0,0,0,.34);
      z-index:19;
    }
    .floating-plus:active{transform:translateY(2px) scale(.98)}

    .modal{
      position:fixed;
      inset:0;
      padding:18px;
      display:grid;
      place-items:center;
      background:rgba(0,0,0,.55);
      backdrop-filter:blur(8px);
      z-index:99;
    }
    .modal.hidden{display:none}
    .modal-card{
      width:min(100%,520px);
      max-height:88dvh;
      overflow:auto;
      border-radius:30px;
      padding:20px;
      color:var(--text);
      background:linear-gradient(145deg,#2a1713,#4b251b 62%,#1b1412);
      border:1px solid var(--line);
      box-shadow:0 30px 90px rgba(0,0,0,.62);
      position:relative;
    }
    .modal-close{
      position:absolute;
      top:12px;
      right:12px;
      width:38px;
      height:38px;
      border:0;
      border-radius:50%;
      background:rgba(255,255,255,.14);
      color:#fff;
      font-size:24px;
    }
    .modal-card h2{margin:10px 44px 12px 0;font-size:27px;letter-spacing:-.04em}
    .modal-card p,.modal-card li{color:var(--muted);line-height:1.45}
    .modal-card ol,.modal-card ul{padding-left:22px}

    .empty{padding:20px;text-align:center;color:var(--muted)}
    .fade{animation:fade .22s ease both}
    @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

    @media(max-width:430px){
      .app-shell{padding-left:12px;padding-right:12px}
      .topbar{align-items:flex-start;padding:12px;border-radius:26px}
      .brand-logo{width:58px;height:58px;border-radius:18px}
      h1{font-size:34px}
      .install-pill{padding:10px 11px;font-size:13px}
      .hero-actions,.two{grid-template-columns:1fr}
      .bottom-nav{bottom:8px;width:calc(100% - 16px)}
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img src="./assets/idei-logo.png" alt="IDEI Consultores" class="brand-logo">
        <div>
          <p class="eyebrow">IDEI Consultores</p>
          <h1>Impulso Positivo</h1>
          <p class="byline">Autor PWA: <strong>Ivo Güell</strong></p>
        </div>
      </div>
      <button class="install-pill" id="installBtn" type="button">Instalar +</button>
    </header>

    <main id="main" class="main fade" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="Navegación principal">
      <button data-view="home" class="nav-item active" type="button"><span>+</span>Hoy</button>
      <button data-view="journal" class="nav-item" type="button"><span>✎</span>Diario</button>
      <button data-view="exercises" class="nav-item" type="button"><span>◎</span>Impulsos</button>
      <button data-view="calendar" class="nav-item" type="button"><span>21</span>Orden</button>
      <button data-view="phrases" class="nav-item" type="button"><span>❞</span>Frases</button>
    </nav>

    <button class="floating-plus" id="quickPlus" type="button" aria-label="Abrir impulso rápido">+</button>
  </div>

  <div class="modal hidden" id="modal" role="dialog" aria-modal="true">
    <div class="modal-card">
      <button class="modal-close" id="modalClose" type="button" aria-label="Cerrar">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    const $ = (selector) => document.querySelector(selector);
    const main = $('#main');
    const modal = $('#modal');
    const modalContent = $('#modalContent');

    const phrases = [
      'Hoy no necesito hacerlo todo. Necesito empezar bien una cosa.',
      'Mi energía sigue a mi atención: hoy la pongo donde suma.',
      'No negocio con mi desánimo: lo escucho, lo ordeno y actúo.',
      'Un pequeño avance real vale más que una gran intención aparcada.',
      'Puedo cambiar el tono del día cambiando mi primera decisión.',
      'Lo positivo no es negar el problema: es entrar en él con recursos.',
      'Cuando mi mente se dispersa, vuelvo a lo concreto: ahora, aquí, siguiente paso.',
      'La confianza no aparece antes de actuar. Muchas veces aparece después.',
      'Hoy elijo palabras que me abran posibilidades, no que me cierren puertas.',
      'Un día difícil también puede contener una decisión buena.',
      'No necesito esperar a sentirme perfecto para hacer algo útil.',
      'Mi actitud no lo controla todo, pero sí cambia cómo entro en todo.',
      'Respirar, ordenar, actuar. Tres movimientos bastan para volver al centro.',
      'El pensamiento positivo útil es disciplinado, no ingenuo.',
      'Si bajo el ruido, sube mi criterio.',
      'Hoy convierto una queja en una acción pequeña y verificable.',
      'Avanzar es también dejar de alimentar lo que me drena.',
      'Mi diálogo interno tiene que ayudarme, no hundirme.',
      'La serenidad se entrena en decisiones pequeñas.',
      'Elijo una mirada más alta sin perder los pies en el suelo.'
    ];

    const exercises = [
      {
        title:'El primer impulso del día',
        tag:'3 minutos',
        text:'Antes de entrar en la agenda, escribe una intención clara: qué actitud quieres activar, qué evitarás alimentar y cuál será tu primer avance concreto.',
        steps:['Define una palabra-guía para hoy.','Elige una tarea que desbloquee algo.','Hazla antes de revisar ruido externo si puedes.']
      },
      {
        title:'Reencuadre operativo',
        tag:'5 minutos',
        text:'Toma una preocupación y conviértela en una pregunta de acción. No preguntes solo “qué me pasa”, pregunta “qué puedo hacer con esto”.',
        steps:['Escribe el problema en una frase.','Formula tres preguntas útiles.','Elige una respuesta accionable en menos de 24 horas.']
      },
      {
        title:'Inventario de energía',
        tag:'7 minutos',
        text:'Identifica qué te carga y qué te drena. El objetivo no es filosofar: es proteger tu energía para decidir mejor.',
        steps:['Anota tres cosas que te dan energía.','Anota tres cosas que te la quitan.','Reduce hoy una fuente de desgaste o acota su tiempo.']
      },
      {
        title:'Tres evidencias contra el bloqueo',
        tag:'4 minutos',
        text:'Cuando la mente exagera el “no puedo”, respóndele con hechos. Busca tres momentos recientes en los que sí resolviste, aguantaste o avanzaste.',
        steps:['Escribe una frase negativa recurrente.','Busca tres evidencias reales que la matizan.','Cierra con una frase más justa y más fuerte.']
      },
      {
        title:'Microvictoria visible',
        tag:'10 minutos',
        text:'Elige una acción pequeña pero visible. La mente necesita señales concretas de progreso, no solo buenos deseos.',
        steps:['Escoge una tarea de máximo diez minutos.','Hazla sin negociar.','Marca el avance y observa el cambio de estado.']
      },
      {
        title:'Limpieza de lenguaje interno',
        tag:'6 minutos',
        text:'Cambia expresiones que cierran por expresiones que abren. La palabra no es decoración: es dirección mental.',
        steps:['Detecta un “no puedo”, “siempre” o “nunca”.','Sustitúyelo por una formulación más precisa.','Añade una acción posible.']
      },
      {
        title:'Foco 1-1-1',
        tag:'2 minutos',
        text:'Una prioridad, una acción, una hora. Sirve para salir del caos y volver a una dirección simple.',
        steps:['Elige una prioridad real.','Define una acción mínima.','Reserva una hora concreta o el primer hueco disponible.']
      },
      {
        title:'Cierre positivo sin fantasía',
        tag:'5 minutos',
        text:'Antes de terminar el día, registra una mejora, una lección y una decisión para mañana. Positividad con criterio.',
        steps:['Qué ha funcionado.','Qué he aprendido.','Qué haré mañana para empezar mejor.']
      }
    ];

    const plans = [
      'Respira 4 veces lentamente antes de mirar el móvil.',
      'Escribe una sola prioridad para hoy.',
      'Haz una llamada, mensaje o gesto pendiente que desbloquee algo.',
      'Ordena durante 7 minutos un espacio físico o digital.',
      'Reformula una queja en una petición o acción.',
      'Agradece algo concreto a una persona concreta.',
      'Cierra una tarea pequeña que arrastras desde hace días.',
      'Protege 25 minutos sin interrupciones.',
      'Detecta una frase interna que te frena y reescríbela.',
      'Haz una pausa consciente antes de responder a algo incómodo.',
      'Sustituye multitarea por una tarea terminada.',
      'Anota tres evidencias de capacidad personal.',
      'Reduce una fuente de ruido durante una hora.',
      'Convierte un “tengo que” en un “elijo hacer”.',
      'Prepara hoy el primer paso de mañana.',
      'Di no a una cosa que no suma.',
      'Dedica 10 minutos a algo que te ordene mentalmente.',
      'Haz una revisión honesta: qué sigo alimentando que me drena.',
      'Reconoce una microvictoria sin minimizarla.',
      'Cierra el día con una decisión simple para mañana.',
      'Repite una frase que te ayude y actúa en coherencia.'
    ];

    let currentView = localStorage.getItem('impulso.view') || 'home';
    let deferredPrompt = null;

    function todayKey(){ return new Date().toISOString().slice(0,10); }
    function pickDaily(array){
      const seed = todayKey().split('-').join('');
      return array[Number(seed) % array.length];
    }
    function escapeHtml(text){
      return String(text).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[c]));
    }
    function openModal(html){ modalContent.innerHTML = html; modal.classList.remove('hidden'); }
    function closeModal(){ modal.classList.add('hidden'); }

    function renderHome(){
      const phrase = pickDaily(phrases);
      const exercise = pickDaily(exercises);
      main.innerHTML = `
        <section class="hero fade">
          <p class="kicker">Impulso de hoy</p>
          <h2>Activa una versión más clara, firme y positiva de ti.</h2>
          <p>Una PWA sencilla para abrir, elegir un impulso, escribir, ordenar el día y entrenar una mentalidad más constructiva.</p>
          <div class="hero-actions">
            <button class="primary" onclick="showExercise(${exercises.indexOf(exercise)})">Hacer impulso</button>
            <button class="secondary" onclick="setView('journal')">Escribir diario</button>
          </div>
        </section>
        <div class="section-title"><div><h2>Frase del día</h2><p>Para repetir y convertir en acción.</p></div></div>
        <section class="quote-card fade"><blockquote>“${phrase}”</blockquote><p>Elige una acción mínima que demuestre esta frase antes de terminar el día.</p></section>
        <div class="section-title"><div><h2>Impulso recomendado</h2><p>${exercise.tag}</p></div></div>
        <section class="card fade"><span class="tag">${exercise.tag}</span><h3>${exercise.title}</h3><p>${exercise.text}</p><div class="journal-actions"><button class="small-btn" onclick="showExercise(${exercises.indexOf(exercise)})">Abrir dinámica</button></div></section>
        <div class="section-title"><div><h2>Plan rápido</h2><p>Una acción para mover el día.</p></div></div>
        <section class="grid two fade">
          <article class="card"><h3>Ahora</h3><p>${plans[new Date().getDate() % plans.length]}</p></article>
          <article class="card"><h3>Cierre</h3><p>Antes de dormir: una cosa que ha funcionado, una que corregirás y una decisión para mañana.</p></article>
        </section>
      `;
    }

    function renderJournal(){
      const entries = JSON.parse(localStorage.getItem('impulso.entries') || '[]');
      main.innerHTML = `
        <div class="section-title"><div><h2>Diario positivo</h2><p>Escritura breve para ordenar pensamiento, energía y acción.</p></div></div>
        <section class="card journal-box fade">
          <textarea id="journalText" placeholder="Hoy me doy cuenta de...\nHoy decido...\nMañana empiezo por..."></textarea>
          <div class="journal-actions">
            <button class="primary" onclick="saveEntry()">Guardar entrada</button>
            <button class="secondary" onclick="journalPrompt()">Darme una pregunta</button>
          </div>
        </section>
        <div class="section-title"><div><h2>Entradas guardadas</h2><p>Se guardan solo en este dispositivo.</p></div></div>
        <section class="grid fade" id="entriesList">
          ${entries.length ? entries.map(e => `<article class="card entry"><time>${e.date}</time><p>${escapeHtml(e.text).replace(/\n/g,'<br>')}</p></article>`).join('') : '<div class="empty">Todavía no hay entradas guardadas.</div>'}
        </section>
      `;
    }

    function renderExercises(){
      main.innerHTML = `
        <div class="section-title"><div><h2>Impulsos</h2><p>Dinámicas no deportivas para entrenar foco, lenguaje interno, energía y acción.</p></div></div>
        <section class="grid fade">
          ${exercises.map((ex,i)=>`<article class="card"><span class="tag">${ex.tag}</span><h3>${ex.title}</h3><p>${ex.text}</p><div class="journal-actions"><button class="small-btn" onclick="showExercise(${i})">Abrir</button></div></article>`).join('')}
        </section>
      `;
    }

    function renderCalendar(){
      const done = JSON.parse(localStorage.getItem('impulso.doneDays') || '{}');
      const count = Object.values(done).filter(Boolean).length;
      const pct = Math.round((count/21)*100);
      main.innerHTML = `
        <div class="section-title"><div><h2>Orden personal 21 días</h2><p>Marca cada día en que haces al menos un impulso.</p></div></div>
        <section class="card fade">
          <h3>${count}/21 días activados</h3>
          <p>No busca perfección. Busca continuidad suficiente para cambiar el tono mental.</p>
          <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
        </section>
        <div class="section-title"><div><h2>Calendario</h2><p>Toca un día para marcarlo o desmarcarlo.</p></div></div>
        <section class="days fade">
          ${Array.from({length:21},(_,i)=>`<button class="day ${done[i+1]?'done':''}" onclick="toggleDay(${i+1})">${i+1}</button>`).join('')}
        </section>
        <div class="section-title"><div><h2>Secuencia sugerida</h2><p>Una microacción por día.</p></div></div>
        <section class="grid fade">
          ${plans.slice(0,21).map((p,i)=>`<article class="card"><h3>Día ${i+1}</h3><p>${p}</p></article>`).join('')}
        </section>
      `;
    }

    function renderPhrases(){
      main.innerHTML = `
        <div class="section-title"><div><h2>Frases de impulso</h2><p>Para repetir, escribir o convertir en una decisión.</p></div></div>
        <section class="grid fade">
          ${phrases.map((p,i)=>`<article class="quote-card"><blockquote>“${p}”</blockquote><p>Frase ${i+1}. Úsala como disparador de una acción mínima.</p></article>`).join('')}
        </section>
      `;
    }

    function render(){
      main.classList.remove('fade');
      void main.offsetWidth;
      main.classList.add('fade');
      document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.view === currentView));
      localStorage.setItem('impulso.view', currentView);
      if(currentView === 'home') renderHome();
      if(currentView === 'journal') renderJournal();
      if(currentView === 'exercises') renderExercises();
      if(currentView === 'calendar') renderCalendar();
      if(currentView === 'phrases') renderPhrases();
    }

    function setView(view){ currentView = view; render(); window.scrollTo({top:0,behavior:'smooth'}); }
    window.setView = setView;

    function showExercise(index){
      const ex = exercises[index];
      openModal(`
        <h2>${ex.title}</h2>
        <p><strong>${ex.tag}</strong></p>
        <p>${ex.text}</p>
        <ol>${ex.steps.map(s => `<li>${s}</li>`).join('')}</ol>
        <button class="primary" onclick="closeModal(); setView('journal')">Escribir lo aprendido</button>
      `);
    }
    window.showExercise = showExercise;

    function saveEntry(){
      const textarea = $('#journalText');
      const text = textarea.value.trim();
      if(!text){
        openModal('<h2>Entrada vacía</h2><p>Escribe una idea, una decisión o un aprendizaje antes de guardar.</p>');
        return;
      }
      const entries = JSON.parse(localStorage.getItem('impulso.entries') || '[]');
      const date = new Date().toLocaleString('es-ES',{dateStyle:'medium',timeStyle:'short'});
      entries.unshift({date,text});
      localStorage.setItem('impulso.entries', JSON.stringify(entries.slice(0,40)));
      textarea.value = '';
      renderJournal();
    }
    window.saveEntry = saveEntry;

    function journalPrompt(){
      const prompts = [
        '¿Qué pensamiento necesito dejar de repetir porque no me ayuda?',
        '¿Qué decisión pequeña haría que hoy terminara mejor?',
        '¿Qué estoy haciendo bien que debo reconocer sin rebajarlo?',
        '¿Qué puedo simplificar ahora mismo?',
        '¿Qué conversación interna necesito cambiar para actuar con más fuerza?'
      ];
      $('#journalText').value = prompts[Math.floor(Math.random()*prompts.length)] + '\n\n';
      $('#journalText').focus();
    }
    window.journalPrompt = journalPrompt;

    function toggleDay(day){
      const done = JSON.parse(localStorage.getItem('impulso.doneDays') || '{}');
      done[day] = !done[day];
      localStorage.setItem('impulso.doneDays', JSON.stringify(done));
      renderCalendar();
    }
    window.toggleDay = toggleDay;

    function quickImpulse(){
      const ex = exercises[Math.floor(Math.random()*exercises.length)];
      showExercise(exercises.indexOf(ex));
    }

    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      deferredPrompt = event;
    });

    async function installApp(){
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      if(deferredPrompt){
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        return;
      }
      if(isIOS){
        openModal('<h2>Instalar en iPhone</h2><p>En Safari, toca el botón de compartir y elige <strong>Añadir a pantalla de inicio</strong>. El icono será el botón naranja con el símbolo +.</p>');
      }else{
        openModal('<h2>Instalar la PWA</h2><p>Abre el menú del navegador y elige <strong>Instalar aplicación</strong> o <strong>Añadir a pantalla de inicio</strong>.</p>');
      }
    }

    document.querySelectorAll('.nav-item').forEach(button => button.addEventListener('click', () => setView(button.dataset.view)));
    $('#quickPlus').addEventListener('click', quickImpulse);
    $('#installBtn').addEventListener('click', installApp);
    $('#modalClose').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if(e.target === modal) closeModal(); });
    window.closeModal = closeModal;

    if('serviceWorker' in navigator){
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => null);
      });
    }

    render();
  </script>
</body>
</html>
